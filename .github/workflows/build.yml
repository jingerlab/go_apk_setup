name: Compile Standalone Mobile APK

on: [push, workflow_dispatch]

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Initialize Android SDK & NDK Environment
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'zulu'

    - name: Install Android NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Set up Go compiler
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Install and Inject Mobile Build Packages
      run: |
        if [ ! -f go.mod ]; then go mod init slidevapp; fi
        go get -tool golang.org/x/mobile/cmd/gobind
        go get golang.org/x/mobile
        go mod tidy
        go install golang.org/x/mobile/cmd/gomobile@latest
        gomobile init

    - name: Cross-Compile Go Backend Module
      run: gomobile bind -target=android -androidapi 21 -o slidevapp.aar .

    - name: Generate Lightweight Platform WebView Shell
      run: |
        npm install -g @capacitor/cli @capacitor/core
        npm init -y
        mkdir www && echo "<html><body></body></html>" > www/index.html
        npx cap init "DAUP Lecture" "com.jingerlab.daup" --web-dir=www
        npm install @capacitor/android
        npx cap add android

    # NEW: Link your Go library (.aar) into the Android project build tree
    - name: Link Go Binary to Gradle
      run: |
        mkdir -p android/app/libs
        cp slidevapp.aar android/app/libs/
        
        # Inject the library file dependency into the Android app's build rules
        sed -i '/dependencies {/a \    implementation files("libs/slidevapp.aar")' android/app/build.gradle

    # NEW: Modify Android's startup file to run your Go logic and load the URL it returns
    - name: Wire Go Engine to MainActivity Startup
      run: |
        cat << 'EOF' > android/app/src/main/java/com/jingerlab/daup/MainActivity.java
        package com.jingerlab.daup;

        import android.os.Bundle;
        import com.getcapacitor.BridgeActivity;
        import slidevapp.Slidevapp; // Imports your compiled Go package natively!

        public class MainActivity extends BridgeActivity {
            @Override
            public void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                
                // 1. Run your Go network routing engine execution thread
                String targetUrl = Slidevapp.initializeAndroidApp();
                
                // 2. Overwrite the webview container to point directly to your Go engine's target
                this.bridge.getWebView().post(new Runnable() {
                    @Override
                    public void run() {
                        bridge.getWebView().loadUrl(targetUrl);
                    }
                });
            }
        }
        EOF

    - name: Build and Package Signed Application
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Export Output Artifact Download Link
      uses: actions/upload-artifact@v4
      with:
        name: SlidevPresentationApp
        path: android/app/build/outputs/apk/debug/app-debug.apk
