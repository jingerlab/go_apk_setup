name: Compile Standalone Mobile APK

on: [push, workflow_dispatch]

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Initialize Android SDK & NDK Environment
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Install Android NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Set up Go compiler
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Install and Inject Mobile Build Packages
      run: |
        if [ ! -f go.mod ]; then go mod init slidevapp; fi
        go get -tool golang.org/x/mobile/cmd/gobind
        go get golang.org/x/mobile
        go mod tidy
        go install golang.org/x/mobile/cmd/gomobile@latest
        gomobile init

    # Added the explicit -api 21 flag to bypass version mismatch constraints
    - name: Cross-Compile Go Backend Module
      run: gomobile bind -target=android -api 21 -o slidevapp.aar .

    - name: Generate Lightweight Platform WebView Shell
      run: |
        npm install -g @capacitor/cli @capacitor/core
        npm init -y
        mkdir www && echo "<html></html>" > www/index.html
        npx cap init "DAUP Lecture" "com.jingerlab.daup" --web-dir=www
        npm install @capacitor/android
        npx cap add android
        
    - name: Build and Package Signed Application
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Export Output Artifact Download Link
      uses: actions/upload-artifact@v4
      with:
        name: SlidevPresentationApp
        path: android/app/build/outputs/apk/debug/app-debug.apk
